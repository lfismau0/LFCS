{% extends 'base.html' %}
{% block title %}Prospectus - LFIS{% endblock %}
{% block content %}
<div class="page-hero">
    <div class="container">
        <h1>School Prospectus</h1>
    </div>
</div>
<section class="section-pad">
    <div class="container">
        <div class="row g-4 justify-content-center">
            {% for p in items %}
            <div class="col-md-4 col-lg-3">
                <div class="card-hover rounded-3 text-center p-4 bg-white">
                    <i class="fas fa-file-pdf fa-4x mb-3" style="color:var(--accent)"></i>
                    <h5>Prospectus {{ p.year }}</h5>
                    {% if p.description %}<p class="text-muted" style="font-size:.85rem">{{ p.description }}</p>{% endif %}
                    <a href="{{ p.pdf_file.url }}" class="btn btn-primary-custom btn-sm mt-2" target="_blank"><i class="fas fa-download me-1"></i>Download</a>
                </div>
            </div>
            {% empty %}<p class="text-muted col-12 text-center">No prospectus available.</p>{% endfor %}
        </div>
    </div>
</section>
{% endblock %}

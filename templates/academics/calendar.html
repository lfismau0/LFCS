{% extends 'base.html' %}
{% block title %}Academic Calendar – LFIS{% endblock %}
{% block content %}
<div class="page-hero">
    <div class="container">
        <h1>Academic Calendar</h1>
    </div>
</div>
<section class="section-pad">
    <div class="container">
        <div class="row g-4">
            {% for item in items %}
            <div class="col-md-6 col-lg-4">
                <div class="card-hover rounded-3 p-4 text-center bg-white">
                    <i class="fas fa-calendar-alt fa-3x mb-3" style="color:var(--primary)"></i>
                    <h5>{{ item.title }}</h5>
                    {% if item.year %}<p class="text-muted">{{ item.year }}</p>{% endif %}
                    <a href="{{ item.pdf_upload.url }}" class="btn btn-primary-custom btn-sm" target="_blank"><i
                            class="fas fa-download me-1"></i>Download PDF</a>
                </div>
            </div>
            {% empty %}<p class="text-muted col-12">No calendars available.</p>{% endfor %}
        </div>
    </div>
</section>
{% endblock %}

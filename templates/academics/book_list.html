{% extends 'base.html' %}
{% block title %}Book List – LFIS{% endblock %}
{% block content %}
<div class="page-hero">
    <div class="container">
        <h1>Book List</h1>
    </div>
</div>
<section class="section-pad">
    <div class="container">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead style="background:var(--primary);color:#fff">
                    <tr>
                        <th>Class</th>
                        <th>Download</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in items %}
                    <tr>
                        <td><i class="fas fa-book me-2" style="color:var(--primary)"></i>{{ item.class_name }}</td>
                        <td><a href="{{ item.pdf_upload.url }}" class="btn btn-sm btn-primary-custom" target="_blank"><i
                                    class="fas fa-download me-1"></i>Download PDF</a></td>
                    </tr>
                    {% empty %}<tr>
                        <td colspan="2" class="text-muted text-center">No book lists available.</td>
                    </tr>{% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</section>
{% endblock %}
